{% extends 'parent.html' %}

{% block content %}
    <h3>Update trainee</h3>
        <form method="post" style="width: 100%;">
            {% csrf_token %}
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ trainee.name }}"><br><br>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" value="{{ trainee.age }}"><br><br>
            <label for="course">Courses:</label><br><br>
            <select id="course" name="course" multiple>
                {% for course in courses %}
                    <option value="{{ course.id }}"
                        {% if course in trainee.course.all %}
                            selected
                        {% endif %}
                    >
                        {{ course.name }}
                    </option>
                {% endfor %}
            </select><br><br>
            <input type="submit" value="Update Trainee">
        </form>
        

{% endblock %}
